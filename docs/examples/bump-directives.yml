# yaml-language-server: $schema=../../go-gitsemver-schema.json
# Bump Directives Only
#
# Uses ONLY explicit bump directives for determining version increments.
# Conventional Commits (feat:, fix:, etc.) are NOT parsed for version bumps.
#
# Directives (as commit message prefix):
#   bump major: <message>   → Major increment
#   bump minor: <message>   → Minor increment
#   bump patch: <message>   → Patch increment
#   bump none: <message>    → No increment (suppress)
#   bump skip: <message>    → No increment (alias for none)
#
# The +semver: style is also supported anywhere in the message:
#   some change +semver: major   → Major increment
#   some change +semver: minor   → Minor increment
#
# When no directive is found, the branch default increment applies.
#
# Version examples (on main, Patch default, after v1.0.0):
#   "bump minor: update auth logic"      → 1.1.0
#   "bump major: redesign API"           → 2.0.0
#   "bump none: update docs"             → 1.0.0 (no increment)
#   "fix a bug"                           → 1.0.1 (branch default: Patch)
#
# Use case: Teams that want explicit, intentional version control
# without adopting a commit message convention.

mode: ContinuousDelivery
tag-prefix: '[vV]'
commit-message-convention: bump-directive

branches:
  main:
    regex: ^master$|^main$
    increment: Patch
    tag: ''
    is-mainline: true
    source-branches: [release, hotfix]

  develop:
    regex: ^dev(elop)?(ment)?$
    increment: Minor
    tag: alpha
    tracks-release-branches: true
    source-branches: [main, release, hotfix, support]

  release:
    regex: ^releases?[/-]
    increment: None
    tag: beta
    is-release-branch: true
    source-branches: [develop, main, support, release]

  feature:
    regex: ^features?[/-]
    increment: Inherit
    tag: '{BranchName}'
    source-branches: [develop, main, release, hotfix, support]

  hotfix:
    regex: ^hotfix(es)?[/-]
    increment: Patch
    tag: beta
    source-branches: [main, support]

  # Catch-all: any branch not matching above is treated like a feature branch
  unknown:
    regex: .*
    increment: Inherit
    tag: '{BranchName}'
    source-branches: [develop, main, release, feature, hotfix, support]
